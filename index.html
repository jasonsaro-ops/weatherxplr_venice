<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEATHERXPLR VENICE // CROSS-SYNOPTIC ARRAY</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Golden Layout Stylesheets -->
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/golden-layout@1.5.9/src/css/goldenlayout-base.css" />
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/golden-layout@1.5.9/src/css/goldenlayout-dark-theme.css" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d1117;
            font-family: 'Share Tech Mono', monospace;
            color: #00ffcc;
        }
        #header-bar {
            height: 40px;
            background: #161b22;
            border-bottom: 2px solid #00ffcc;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 100;
        }
        .title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #00ffcc;
        }
        .timer-badge {
            background: #21262d;
            padding: 4px 10px;
            border: 1px solid #30363d;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        #desktopLayoutContainer {
            width: 100%;
            height: calc(100vh - 40px);
            position: relative;
        }
        .weather-component {
            padding: 15px;
            height: 100%;
            background: #0d1117;
            box-sizing: border-box;
            overflow-y: auto;
        }
        .alert-item {
            border-left: 4px solid #ff3333;
            background: #211515;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 2px;
            cursor: pointer;
        }
        .alert-title { color: #ff5555; font-weight: bold; text-transform: uppercase; }
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }
        .forecast-card {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 12px;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .forecast-card:hover { border-color: #00ffcc; }
        .forecast-card img { width: 44px; height: 44px; margin: 6px 0; }
        .temp-high { color: #ff9900; font-weight: bold; }
        .temp-low { color: #00ccff; font-weight: bold; }
        .aqi-station-row {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 14px;
        }
        .aqi-station-header {
            font-size: 0.9rem;
            color: #fff;
            border-bottom: 1px dashed #30363d;
            padding-bottom: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        .aqi-panel-wrap { display: flex; gap: 12px; flex-wrap: wrap; }
        .aqi-block-metric {
            flex: 1;
            min-width: 100px;
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 4px;
            padding: 10px;
            text-align: center;
        }
        .aqi-score-callout { font-size: 2.2rem; font-weight: bold; margin: 4px 0; }
        .aqi-pill-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #000;
        }
        .gauge-card {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .gauge-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #00ffcc;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            width: 100%;
            text-align: left;
        }
        .gauge-btn:hover { background: rgba(0,255,204,0.1); border-color: #00ffcc; }
        .hub-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(4px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .hub-modal-content {
            background: #161b22;
            border: 2px solid #00ffcc;
            width: 95%;
            max-width: 850px;
            max-height: 85vh;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .hub-modal-header {
            background: #21262d;
            padding: 12px 20px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hub-modal-title { font-size: 1.1rem; font-weight: bold; color: #00ffcc; text-transform: uppercase; }
        .hub-modal-close { color: #8b949e; cursor: pointer; font-size: 1.2rem; }
        .hub-modal-close:hover { color: #ff5555; }
        .hub-modal-body { padding: 20px; overflow-y: auto; color: #fff; }

        /* Golden Layout Style Customizations */
        .lm_header { background: #161b22 !important; }
        .lm_tab { background: #21262d !important; color: #8b949e !important; font-family: 'Share Tech Mono', monospace !important; border: 1px solid #30363d !important;}
        .lm_tab.lm_active { background: #0d1117 !important; color: #00ffcc !important; border-bottom: none !important; box-shadow: 0 -2px 0 #00ffcc inset;}
        .lm_content { background: #0d1117 !important; border: 1px solid #21262d; }
    </style>
</head>
<body>

    <div id="header-bar">
        <div class="title"><i class="fa-solid fa-satellite"></i> WEATHERXPLR VENICE // CROSS-SYNOPTIC CONTROL ARRAY</div>
        <div class="timer-badge">CYCLE REMAINING: <span id="countdown">120</span>s</div>
    </div>

    <div id="desktopLayoutContainer"></div>

    <div id="hubFloatingModal" class="hub-modal">
        <div class="hub-modal-content">
            <div class="hub-modal-header">
                <div id="modalTitle" class="hub-modal-title">Telemetry Stream</div>
                <div class="hub-modal-close" onclick="closeFloatingModal()"><i class="fa-solid fa-xmark"></i></div>
            </div>
            <div id="modalBody" class="hub-modal-body">Loading secure feed packets...</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/golden-layout@1.5.9/dist/goldenlayout.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
